name: PR Notification

on:
  pull_request:
    types: [opened, reopened]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send to Teams
        run: |
          # Labels
          LABELS=$(echo '${{ toJson(github.event.pull_request.labels.*.name) }}' | tr -d '[]"' | tr ',' ', ')
          if [ -z "$LABELS" ]; then LABELS="None"; fi

          # Individual reviewers
          USER_REVIEWERS=$(echo '${{ toJson(github.event.pull_request.requested_reviewers.*.login) }}' | tr -d '[]"' | tr ',' ', ')

          # Team reviewers (CODEOWNERS)
          TEAM_REVIEWERS=$(echo '${{ toJson(github.event.pull_request.requested_teams.*.name) }}' | tr -d '[]"' | tr ',' ', ')

          # Merge both
          REVIEWERS="$USER_REVIEWERS, $TEAM_REVIEWERS"
          REVIEWERS=$(echo "$REVIEWERS" | sed 's/^, //; s/, $//')

          if [ -z "$REVIEWERS" ]; then REVIEWERS="None"; fi

          curl -H "Content-Type: application/json" \
          -d "{
            \"type\": \"message\",
            \"attachments\": [
              {
                \"contentType\": \"application/vnd.microsoft.card.adaptive\",
                \"content\": {
                  \"type\": \"AdaptiveCard\",
                  \"version\": \"1.4\",
                  \"body\": [
                    {
                      \"type\": \"TextBlock\",
                      \"text\": \"🚀 New Pull Request\",
                      \"weight\": \"Bolder\",
                      \"size\": \"Medium\"
                    },

                    {
                      \"type\": \"TextBlock\",
                      \"text\": \"📌 Title\",
                      \"weight\": \"Bolder\",
                      \"spacing\": \"Medium\"
                    },
                    {
                      \"type\": \"TextBlock\",
                      \"text\": \"${{ github.event.pull_request.title }}\",
                      \"wrap\": true
                    },

                    {
                      \"type\": \"TextBlock\",
                      \"text\": \"📝 Description\",
                      \"weight\": \"Bolder\",
                      \"spacing\": \"Medium\"
                    },
                    {
                      \"type\": \"TextBlock\",
                      \"text\": \"${{ github.event.pull_request.body }}\",
                      \"wrap\": true
                    },

                    {
                      \"type\": \"TextBlock\",
                      \"text\": \"📊 Details\",
                      \"weight\": \"Bolder\",
                      \"spacing\": \"Medium\"
                    },

                    {
                      \"type\": \"FactSet\",
                      \"facts\": [
                        {
                          \"title\": \"👤 Author\",
                          \"value\": \"${{ github.event.pull_request.user.login }}\"
                        },
                        {
                          \"title\": \"🌿 Branch\",
                          \"value\": \"${{ github.event.pull_request.head.ref }}\"
                        },
                        {
                          \"title\": \"📦 Repository\",
                          \"value\": \"${{ github.repository }}\"
                        },
                        {
                          \"title\": \"🏷 Labels\",
                          \"value\": \"$LABELS\"
                        },
                        {
                          \"title\": \"👥 Reviewers\",
                          \"value\": \"$REVIEWERS\"
                        }
                      ]
                    }
                  ],
                  \"actions\": [
                    {
                      \"type\": \"Action.OpenUrl\",
                      \"title\": \"🔗 View PR\",
                      \"url\": \"${{ github.event.pull_request.html_url }}\"
                    }
                  ]
                }
              }
            ]
          }" \
          ${{ secrets.TEAMS_WEBHOOK }}