name: PR Notification

on:
  pull_request:
    types: [opened, reopened]
  pull_request_review:
    types: [submitted]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send to Teams
        run: |
          EVENT_NAME="${{ github.event_name }}"

          # Default header
          HEADER="🚀 Pull Request Created"

          # Handle review events
          if [ "$EVENT_NAME" = "pull_request_review" ]; then
            REVIEW_STATE="${{ github.event.review.state }}"
            REVIEWER="${{ github.event.review.user.login }}"

            if [ "$REVIEW_STATE" = "approved" ]; then
              HEADER="✅ PR Approved by $REVIEWER"
            elif [ "$REVIEW_STATE" = "changes_requested" ]; then
              HEADER="❌ Changes Requested by $REVIEWER"
            else
              HEADER="💬 Review Comment by $REVIEWER"
            fi
          fi

          # Description fallback
          DESCRIPTION="${{ github.event.pull_request.body }}"
          if [ -z "$DESCRIPTION" ]; then DESCRIPTION="No description provided"; fi

          # Labels
          LABELS=$(echo '${{ toJson(github.event.pull_request.labels.*.name) }}' | tr -d '[]"' | tr ',' ', ')
          if [ -z "$LABELS" ]; then LABELS="None"; fi

          # Individual reviewers
          USER_REVIEWERS=$(echo '${{ toJson(github.event.pull_request.requested_reviewers.*.login) }}' | tr -d '[]"' | tr ',' ', ')

          # Team reviewers (CODEOWNERS)
          TEAM_REVIEWERS=$(echo '${{ toJson(github.event.pull_request.requested_teams.*.name) }}' | tr -d '[]"' | tr ',' ', ')

          # Merge reviewers
          REVIEWERS="$USER_REVIEWERS, $TEAM_REVIEWERS"
          REVIEWERS=$(echo "$REVIEWERS" | sed 's/^, //; s/, $//')
          if [ -z "$REVIEWERS" ]; then REVIEWERS="None"; fi

          # PR size
          ADDITIONS=${{ github.event.pull_request.additions }}
          DELETIONS=${{ github.event.pull_request.deletions }}
          TOTAL=$((ADDITIONS + DELETIONS))

          # Impact classification
          if [ "$TOTAL" -gt 500 ]; then
            IMPACT="🔴 High Impact"
          elif [ "$TOTAL" -gt 100 ]; then
            IMPACT="🟡 Medium Impact"
          else
            IMPACT="🟢 Low Impact"
          fi

          # Status (Draft or Ready)
          if [ "${{ github.event.pull_request.draft }}" = "true" ]; then
            STATUS="📝 Draft"
          else
            STATUS="✅ Ready"
          fi

          curl -H "Content-Type: application/json" \
          -d "{
            \"type\": \"message\",
            \"attachments\": [
              {
                \"contentType\": \"application/vnd.microsoft.card.adaptive\",
                \"content\": {
                  \"type\": \"AdaptiveCard\",
                  \"version\": \"1.4\",
                  \"body\": [
                    {
                      \"type\": \"TextBlock\",
                      \"text\": \"$HEADER\",
                      \"weight\": \"Bolder\",
                      \"size\": \"Medium\"
                    },

                    {
                      \"type\": \"TextBlock\",
                      \"text\": \"📌 Title\",
                      \"weight\": \"Bolder\",
                      \"spacing\": \"Medium\"
                    },
                    {
                      \"type\": \"TextBlock\",
                      \"text\": \"**${{ github.event.pull_request.title }}**\",
                      \"wrap\": true
                    },

                    {
                      \"type\": \"TextBlock\",
                      \"text\": \"📝 Description\",
                      \"weight\": \"Bolder\",
                      \"spacing\": \"Medium\"
                    },
                    {
                      \"type\": \"TextBlock\",
                      \"text\": \"$DESCRIPTION\",
                      \"wrap\": true
                    },

                    {
                      \"type\": \"TextBlock\",
                      \"text\": \"\",
                      \"separator\": true,
                      \"spacing\": \"Medium\"
                    },

                    {
                      \"type\": \"TextBlock\",
                      \"text\": \"📊 Details\",
                      \"weight\": \"Bolder\",
                      \"spacing\": \"Medium\"
                    },

                    {
                      \"type\": \"FactSet\",
                      \"facts\": [
                        {
                          \"title\": \"🧑‍💻 Author\",
                          \"value\": \"${{ github.event.pull_request.user.login }}\"
                        },
                        {
                          \"title\": \"🌿 Branch\",
                          \"value\": \"${{ github.event.pull_request.head.ref }}\"
                        },
                        {
                          \"title\": \"📦 Repository\",
                          \"value\": \"${{ github.repository }}\"
                        },
                        {
                          \"title\": \"🏷 Labels\",
                          \"value\": \"$LABELS\"
                        },
                        {
                          \"title\": \"🔍 Reviewers\",
                          \"value\": \"$REVIEWERS\"
                        },
                        {
                          \"title\": \"📌 Status\",
                          \"value\": \"$STATUS\"
                        },
                        {
                          \"title\": \"📏 Changes\",
                          \"value\": \"+$ADDITIONS / -$DELETIONS\"
                        },
                        {
                          \"title\": \"⚠️ Impact\",
                          \"value\": \"$IMPACT\"
                        }
                      ]
                    }
                  ],
                  \"actions\": [
                    {
                      \"type\": \"Action.OpenUrl\",
                      \"title\": \"🔗 View PR\",
                      \"url\": \"${{ github.event.pull_request.html_url }}\"
                    }
                  ]
                }
              }
            ]
          }" \
          ${{ secrets.TEAMS_WEBHOOK }}