name: PR Notification

on:
  pull_request:
    types: [opened, reopened, closed, synchronize]
  pull_request_review:
    types: [submitted, edited, dismissed]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send to Teams
        run: |
          EVENT_NAME="${{ github.event_name }}"
          ACTION="${{ github.event.action }}"

          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_BODY="${{ github.event.pull_request.body }}"
          FILES_CHANGED=${{ github.event.pull_request.changed_files }}

          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)

          AUTHOR_NAME="${{ github.event.pull_request.user.login }}"
          AUTHOR_URL="https://github.com/$AUTHOR_NAME"

          BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
          BRANCH_URL="${{ github.event.pull_request.html_url }}"

          REPO_URL="https://github.com/${{ github.repository }}"
          PR_URL="${{ github.event.pull_request.html_url }}"

          if [ -z "$PR_TITLE" ]; then PR_TITLE="No title"; fi
          if [ -z "$PR_BODY" ]; then PR_BODY="No description provided"; fi

          ########################################
          # HEADER
          ########################################

          HEADER="● Pull Request Created (#$PR_NUMBER)"

          if [ "$EVENT_NAME" = "pull_request" ] && [ "$ACTION" = "closed" ]; then
            if [ "${{ github.event.pull_request.merged }}" = "true" ]; then
              HEADER="✓ Pull Request Merged (#$PR_NUMBER)"
            else
              HEADER="✕ Pull Request Closed (#$PR_NUMBER)"
            fi
          fi

          ########################################
          # LABELS
          ########################################

          LABELS=$(echo '${{ toJson(github.event.pull_request.labels.*.name) }}' | tr -d '[]"' | tr ',' ', ')
          if [ -z "$LABELS" ]; then LABELS="None"; fi

          ########################################
          # REVIEWERS
          ########################################

          USER_REVIEWERS=$(echo '${{ toJson(github.event.pull_request.requested_reviewers.*.login) }}' | tr -d '[]"' | tr ',' ', ')
          TEAM_REVIEWERS=$(echo '${{ toJson(github.event.pull_request.requested_teams.*.name) }}' | tr -d '[]"' | tr ',' ', ')

          ########################################
          # CLICKABLE REVIEWERS
          ########################################

          CLICKABLE_REVIEWERS=""

          if [ "$USER_REVIEWERS" != "" ]; then
            for user in $(echo "$USER_REVIEWERS" | tr ',' ' '); do
              CLEAN_USER=$(echo "$user" | xargs)
              if [ -n "$CLEAN_USER" ]; then
                CLICKABLE_REVIEWERS="$CLICKABLE_REVIEWERS[$CLEAN_USER](https://github.com/$CLEAN_USER), "
              fi
            done
          fi

          if [ "$TEAM_REVIEWERS" != "" ]; then
            CLICKABLE_REVIEWERS="$CLICKABLE_REVIEWERS$TEAM_REVIEWERS"
          fi

          CLICKABLE_REVIEWERS=$(echo "$CLICKABLE_REVIEWERS" | sed 's/, $//')

          if [ -z "$CLICKABLE_REVIEWERS" ]; then
            CLICKABLE_REVIEWERS="None"
          fi

          ########################################
          # SIZE
          ########################################

          ADDITIONS=${{ github.event.pull_request.additions }}
          DELETIONS=${{ github.event.pull_request.deletions }}
          TOTAL=$((ADDITIONS + DELETIONS))

          if [ "$TOTAL" -gt 500 ]; then
            IMPACT="High Impact"
          elif [ "$TOTAL" -gt 100 ]; then
            IMPACT="Medium Impact"
          else
            IMPACT="Low Impact"
          fi

          ########################################
          # STATUS
          ########################################

          if [ "$EVENT_NAME" = "pull_request" ] && [ "$ACTION" = "closed" ]; then
            if [ "${{ github.event.pull_request.merged }}" = "true" ]; then
              STATUS="Merged"
            else
              STATUS="Closed"
            fi
          else
            if [ "${{ github.event.pull_request.draft }}" = "true" ]; then
              STATUS="Draft"
            else
              STATUS="In Progress"
            fi
          fi

          ########################################
          # MERGED / APPROVED
          ########################################

          MERGED_BY=""
          APPROVED_BY=""

          if [ "$EVENT_NAME" = "pull_request" ] && [ "$ACTION" = "closed" ]; then
            if [ "${{ github.event.pull_request.merged }}" = "true" ]; then
              MERGED_BY="${{ github.event.pull_request.merged_by.login }}"
              APPROVED_BY="$CLICKABLE_REVIEWERS"
            fi
          fi

          ########################################
          # DYNAMIC
          ########################################

          MERGED_BLOCK=""
          APPROVED_BLOCK=""

          if [ -n "$MERGED_BY" ]; then
            MERGED_BLOCK="{ \"title\": \"Merged By\", \"value\": \"$MERGED_BY\" },"
          fi

          if [ -n "$APPROVED_BY" ]; then
            APPROVED_BLOCK="{ \"title\": \"Approved By\", \"value\": \"$APPROVED_BY\" },"
          fi

          ########################################
          # ALERTS
          ########################################

          ALERTS=""

          if [ "$PR_BODY" = "No description provided" ]; then
            ALERTS="$ALERTS• Missing description\n"
          fi

          if [ "$CLICKABLE_REVIEWERS" = "None" ]; then
            ALERTS="$ALERTS• No reviewers assigned\n"
          fi

          if [ "$LABELS" = "None" ]; then
            ALERTS="$ALERTS• No labels assigned\n"
          fi

          if [ "$TOTAL" -gt 500 ]; then
            ALERTS="$ALERTS• Large PR detected\n"
          fi

          ########################################
          # ALERT BLOCK
          ########################################

          ALERT_BLOCK=""

          if [ -n "$ALERTS" ]; then
            ALERT_BLOCK="{
              \"type\": \"TextBlock\",
              \"text\": \"⚠︎ Alerts\",
              \"weight\": \"Bolder\"
            },
            {
              \"type\": \"TextBlock\",
              \"text\": \"$ALERTS\",
              \"wrap\": true
            },"
          fi

          ########################################
          # SEND
          ########################################

          curl -H "Content-Type: application/json" \
          -d "{
            \"type\": \"message\",
            \"attachments\": [
              {
                \"contentType\": \"application/vnd.microsoft.card.adaptive\",
                \"content\": {
                  \"type\": \"AdaptiveCard\",
                  \"version\": \"1.4\",
                  \"body\": [

                    { \"type\": \"TextBlock\", \"text\": \"$HEADER\", \"weight\": \"Bolder\", \"size\": \"Medium\" },

                    { \"type\": \"TextBlock\", \"text\": \"\", \"separator\": true },

                    { \"type\": \"TextBlock\", \"text\": \"**Title**  $PR_TITLE\", \"wrap\": true },
                    { \"type\": \"TextBlock\", \"text\": \"**Description**  $PR_BODY\", \"wrap\": true },

                    $ALERT_BLOCK

                    { \"type\": \"TextBlock\", \"text\": \"\", \"separator\": true, \"spacing\": \"Medium\" },

                    { \"type\": \"TextBlock\", \"text\": \"Details\", \"weight\": \"Bolder\" },

                    { \"type\": \"TextBlock\", \"text\": \"\", \"separator\": true, \"spacing\": \"Small\" },

                    {
                      \"type\": \"FactSet\",
                      \"facts\": [
                        { \"title\": \"PR Number\", \"value\": \"#$PR_NUMBER\" },
                        { \"title\": \"Author\", \"value\": \"[$AUTHOR_NAME]($AUTHOR_URL)\" },
                        { \"title\": \"Branch\", \"value\": \"[$BRANCH_NAME]($PR_URL)\" },
                        { \"title\": \"Repository\", \"value\": \"[$REPO_NAME]($REPO_URL)\" },
                        { \"title\": \"Labels\", \"value\": \"$LABELS\" },
                        { \"title\": \"Reviewers\", \"value\": \"$CLICKABLE_REVIEWERS\" },
                        { \"title\": \"Status\", \"value\": \"$STATUS\" },
                        $MERGED_BLOCK
                        $APPROVED_BLOCK
                        { \"title\": \"Changes\", \"value\": \"+$ADDITIONS / -$DELETIONS\" },
                        { \"title\": \"Files\", \"value\": \"$FILES_CHANGED files\" },
                        { \"title\": \"Impact\", \"value\": \"$IMPACT\" }
                      ]
                    }

                  ],
                  \"actions\": [
                    {
                      \"type\": \"Action.OpenUrl\",
                      \"title\": \"View PR\",
                      \"url\": \"$PR_URL\"
                    }
                  ]
                }
              }
            ]
          }" \
          ${{ secrets.TEAMS_WEBHOOK }}
